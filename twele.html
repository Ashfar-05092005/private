<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Nazrin's Surprise - React</title>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Dancing+Script:wght@400;700&family=Lato:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --rose: #e8547a;
      --rose2: #c2185b;
      --rose3: #ff8fab;
      --gold: #d4a853;
      --gold2: #f0c070;
      --deep: #02020a;
      --purple: #a066ff;
    }

    html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
    body {
      background: var(--deep);
      color: #fff;
      font-family: 'Cormorant Garamond', serif;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    #app { min-height: 100vh; }

    #three-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      z-index: 0;
    }

    #hint {
      position: fixed;
      bottom: clamp(14px, 3.5vw, 28px);
      width: 100%;
      text-align: center;
      color: #dcd0ff;
      font-family: 'Dancing Script', cursive;
      font-size: clamp(12px, 2.5vw, 16px);
      letter-spacing: 3px;
      text-shadow: 0 0 18px var(--purple);
      pointer-events: none;
      z-index: 250;
      transition: opacity 0.8s;
      padding: 0 12px;
    }

    #hint.hidden { opacity: 0; }

    .screen {
      position: fixed;
      inset: 0;
      z-index: 200;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 0.8s, visibility 0.8s;
      padding: clamp(14px, 4vw, 40px);
    }

    .screen.gone {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    #envelope-screen {
      background: radial-gradient(ellipse at 50% 40%, rgba(40, 8, 25, 0.88) 0%, rgba(2, 2, 10, 0.94) 70%);
    }

    .env-title {
      font-family: 'Dancing Script', cursive;
      font-size: clamp(16px, 3.5vw, 24px);
      color: rgba(255, 255, 255, 0.6);
      letter-spacing: 3px;
      margin-bottom: clamp(24px, 5vw, 48px);
      text-align: center;
      text-shadow: 0 0 18px rgba(160, 102, 255, 0.6);
    }

    .envelope-wrap {
      position: relative;
      cursor: pointer;
      transition: transform 0.35s;
      -webkit-tap-highlight-color: transparent;
    }

    .envelope-wrap:hover { transform: translateY(-10px) scale(1.04); }
    .env-svg {
      width: clamp(170px, 38vw, 295px);
      filter: drop-shadow(0 0 28px rgba(232, 84, 122, 0.6));
      display: block;
    }

    .open-label {
      margin-top: clamp(14px, 3vw, 26px);
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: clamp(14px, 3vw, 19px);
      color: rgba(255, 255, 255, 0.45);
    }

    #reveal-msg {
      position: fixed;
      inset: 0;
      z-index: 300;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at center, rgba(29, 7, 20, 0.97) 0%, rgba(2, 2, 10, 0.99) 70%);
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.8s, visibility 0.8s;
      text-align: center;
      padding: clamp(20px, 5vw, 60px);
    }

    #reveal-msg.show { opacity: 1; visibility: visible; }

    .reveal-ornament {
      font-family: 'Dancing Script', cursive;
      font-size: clamp(11px, 2.5vw, 16px);
      letter-spacing: 6px;
      color: var(--gold2);
      margin-bottom: clamp(16px, 4vw, 30px);
    }

    .reveal-quote {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: clamp(17px, 4.5vw, 38px);
      color: #fff;
      max-width: 660px;
      line-height: 1.8;
    }

    .reveal-quote em {
      color: var(--rose3);
      font-family: 'Great Vibes', cursive;
      font-style: normal;
      font-size: 1.4em;
    }

    .reveal-sub {
      margin-top: clamp(14px, 3vw, 28px);
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: clamp(13px, 2.5vw, 16px);
      color: rgba(255, 255, 255, 0.42);
    }

    .reveal-continue,
    .pw-btn,
    .hero-badge button,
    .confetti-btn {
      margin-top: clamp(24px, 5vw, 40px);
      border: 1px solid rgba(212, 168, 83, 0.45);
      border-radius: 50px;
      padding: 12px 30px;
      font-family: 'Lato', sans-serif;
      letter-spacing: 4px;
      text-transform: uppercase;
      font-size: 11px;
      color: var(--gold2);
      background: transparent;
      cursor: pointer;
      transition: 0.3s;
    }

    .reveal-continue:hover,
    .pw-btn:hover,
    .hero-badge button:hover,
    .confetti-btn:hover {
      color: #fff;
      background: rgba(212, 168, 83, 0.12);
      transform: translateY(-2px);
    }

    #password-screen { background: transparent; pointer-events: none; }

    .pw-card {
      pointer-events: all;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: radial-gradient(ellipse at 30% 20%, rgba(50, 10, 28, 0.72) 0%, rgba(8, 2, 14, 0.65) 100%);
      backdrop-filter: blur(18px) saturate(1.2);
      border: 1px solid rgba(232, 84, 122, 0.18);
      border-radius: 28px;
      padding: clamp(24px, 5vw, 48px);
      max-width: 440px;
      width: 100%;
      box-shadow: 0 28px 80px rgba(0, 0, 0, 0.55);
    }

    .pw-lock { font-size: 46px; margin-bottom: 14px; }

    .pw-title {
      font-family: 'Great Vibes', cursive;
      font-size: clamp(36px, 8vw, 74px);
      color: transparent;
      background: linear-gradient(135deg, #ff8fab, #e8547a, #d4a853);
      -webkit-background-clip: text;
      background-clip: text;
      text-align: center;
    }

    .pw-sub {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 17px;
      color: rgba(255, 255, 255, 0.42);
      margin-bottom: 26px;
      text-align: center;
    }

    .pw-box { width: 100%; display: flex; flex-direction: column; gap: 10px; align-items: center; }

    .pw-input {
      width: 100%;
      padding: 12px 18px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(212, 168, 83, 0.3);
      border-radius: 50px;
      color: #fff;
      font-family: 'Lato', sans-serif;
      font-size: 14px;
      letter-spacing: 2px;
      text-align: center;
      outline: none;
    }

    .pw-input.wrong { border-color: rgba(232, 84, 122, 0.9); }

    .pw-error {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 14px;
      color: var(--rose3);
      opacity: 0;
      transition: opacity 0.3s;
      height: 20px;
    }

    .pw-error.show { opacity: 1; }

    #main-site { position: relative; z-index: 5; }

    #particles-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      overflow: hidden;
    }

    .petal {
      position: absolute;
      top: -60px;
      animation: petalFall linear infinite;
      opacity: 0.5;
    }

    .fheart {
      position: absolute;
      bottom: -80px;
      animation: floatUp linear infinite;
      opacity: 0;
    }

    @keyframes petalFall {
      0% { transform: translateY(0) rotate(0deg) translateX(0); opacity: 0.6; }
      50% { transform: translateY(50vh) rotate(180deg) translateX(35px); }
      100% { transform: translateY(110vh) rotate(360deg) translateX(-25px); opacity: 0; }
    }

    @keyframes floatUp {
      0% { transform: translateY(0) scale(0.5); opacity: 0; }
      10% { opacity: 0.5; }
      90% { opacity: 0.2; }
      100% { transform: translateY(-110vh) scale(1.2); opacity: 0; }
    }

    .music-bar {
      position: fixed;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      background: rgba(2, 2, 10, 0.9);
      border: 1px solid rgba(212, 168, 83, 0.2);
      border-radius: 50px;
      padding: 8px 18px;
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 190px;
    }

    .music-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--gold);
      animation: mPulse 1.4s ease infinite;
    }

    @keyframes mPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.6); opacity: 0.6; }
    }

    .music-title {
      font-family: 'Dancing Script', cursive;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.7);
    }

    section {
      min-height: 100svh;
      position: relative;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: clamp(56px, 9vw, 80px) clamp(14px, 4vw, 24px);
    }

    #hero {
      background: radial-gradient(ellipse at 50% 20%, rgba(61, 10, 32, 0.9) 0%, rgba(2, 2, 10, 0.95) 60%);
      text-align: center;
      flex-direction: column;
    }

    .hero-pre {
      font-family: 'Dancing Script', cursive;
      color: var(--gold2);
      letter-spacing: 4px;
      margin-bottom: 10px;
    }

    .hero-title {
      font-family: 'Great Vibes', cursive;
      font-size: clamp(52px, 14vw, 140px);
      color: transparent;
      background: linear-gradient(135deg, #ff8fab, #e8547a, #d4a853, #ff8fab);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      background-clip: text;
      animation: gradShift 4s ease infinite;
      line-height: 1.05;
    }

    @keyframes gradShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    .hero-name {
      font-family: 'Great Vibes', cursive;
      font-size: clamp(36px, 9vw, 92px);
      color: var(--rose3);
      margin-bottom: 20px;
    }

    .hero-sub {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: clamp(14px, 2.5vw, 21px);
      color: rgba(255, 255, 255, 0.65);
      max-width: 560px;
      line-height: 1.9;
    }

    .hero-date {
      margin-top: 20px;
      font-family: 'Lato', sans-serif;
      font-size: 11px;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: var(--gold);
    }

    #quote-section {
      background: linear-gradient(180deg, rgba(2, 2, 10, 1) 0%, rgba(18, 3, 26, 1) 100%);
      text-align: center;
      flex-direction: column;
    }

    .section-eyebrow {
      font-family: 'Lato', sans-serif;
      font-size: 11px;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: var(--gold2);
      margin-bottom: 12px;
      text-align: center;
    }

    .section-heading {
      font-family: 'Playfair Display', serif;
      font-size: clamp(22px, 5vw, 48px);
      font-style: italic;
      text-align: center;
      margin-bottom: clamp(24px, 5vw, 48px);
      background: linear-gradient(135deg, #fff 30%, var(--rose3));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .big-quote {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: clamp(18px, 4.5vw, 44px);
      line-height: 1.75;
      max-width: 680px;
    }

    .big-quote em {
      color: var(--rose3);
      font-style: normal;
      font-family: 'Great Vibes', cursive;
      font-size: 1.35em;
    }

    #reasons {
      background: radial-gradient(ellipse at bottom, #1a0510 0%, rgba(2, 2, 10, 1) 60%);
      flex-direction: column;
    }

    .reasons-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(min(250px, 100%), 1fr));
      gap: 14px;
      max-width: 920px;
      width: 100%;
    }

    .r-card {
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.01));
      border: 1px solid rgba(212, 168, 83, 0.12);
      border-radius: 18px;
      padding: 24px;
    }

    .r-num { font-family: 'Great Vibes', cursive; font-size: 42px; color: rgba(212, 168, 83, 0.22); }
    .r-title { font-family: 'Playfair Display', serif; color: var(--gold2); margin-bottom: 8px; }
    .r-body { color: rgba(255, 255, 255, 0.62); line-height: 1.8; }

    #letter {
      background: linear-gradient(135deg, rgba(2, 2, 10, 1), rgba(21, 3, 16, 1));
      flex-direction: column;
      text-align: center;
    }

    .letter-flip-wrap {
      width: 100%;
      max-width: 640px;
      perspective: 1400px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .letter-flipper {
      position: relative;
      width: 100%;
      transition: transform 0.9s cubic-bezier(0.4, 0.2, 0.2, 1);
      transform-style: preserve-3d;
    }

    .letter-flipper.flipped { transform: rotateY(180deg); }

    .letter-front,
    .letter-back {
      width: 100%;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: 4px 4px 24px 24px;
      overflow: hidden;
    }

    .letter-front { position: relative; }

    .letter-back {
      position: absolute;
      inset: 0;
      transform: rotateY(180deg);
      background: #04040f;
      min-height: 420px;
    }

    #letter-three-canvas {
      width: 100%;
      height: 100%;
      display: block;
      border-radius: 4px 4px 24px 24px;
    }

    .back-hint {
      position: absolute;
      bottom: 12px;
      width: 100%;
      text-align: center;
      font-family: 'Dancing Script', cursive;
      font-size: clamp(10px, 2vw, 13px);
      color: rgba(212, 168, 83, 0.6);
      letter-spacing: 2px;
      pointer-events: none;
      z-index: 2;
    }

    .flip-hint {
      margin-top: 12px;
      font-family: 'Dancing Script', cursive;
      font-size: clamp(11px, 2.5vw, 15px);
      color: rgba(255, 255, 255, 0.36);
      letter-spacing: 2px;
    }

    .letter-paper {
      width: 100%;
      background: linear-gradient(160deg, #fff9f5, #fff5f8, #fff9f0);
      border-radius: 4px 4px 24px 24px;
      padding: clamp(28px, 5.5vw, 56px) clamp(18px, 4.5vw, 48px) clamp(24px, 5vw, 48px);
      box-shadow: 0 36px 90px rgba(0, 0, 0, 0.7);
    }

    .letter-to {
      font-family: 'Lato', sans-serif;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 7px;
      text-align: left;
    }

    .letter-dear {
      font-family: 'Dancing Script', cursive;
      font-size: clamp(26px, 5.5vw, 38px);
      color: var(--rose2);
      text-align: left;
      margin-bottom: 16px;
    }

    .letter-body-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(13px, 2.5vw, 16px);
      font-style: italic;
      color: #3d2030;
      line-height: 1.95;
      text-align: left;
    }

    .letter-body-text p + p { margin-top: 10px; }

    .letter-sig {
      margin-top: 20px;
      text-align: right;
      font-family: 'Dancing Script', cursive;
      font-size: clamp(20px, 4.5vw, 32px);
      color: var(--rose2);
    }

    #gallery {
      background: radial-gradient(ellipse at top, #1a0510 0%, rgba(2, 2, 10, 1) 70%);
      flex-direction: column;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(2, clamp(110px, 17vw, 180px));
      gap: 10px;
      max-width: 780px;
      width: 100%;
      margin-top: 30px;
    }

    .g-slot {
      border-radius: 11px;
      border: 1px dashed rgba(212, 168, 83, 0.17);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 7px;
      background: linear-gradient(135deg, rgba(212, 168, 83, 0.03), rgba(232, 84, 122, 0.02));
      position: relative;
      overflow: hidden;
      cursor: pointer;
    }

    .g-slot:nth-child(1),
    .g-slot:nth-child(4) {
      grid-column: span 2;
    }

    .g-slot-icon { font-size: 26px; opacity: 0.36; }
    .g-slot-txt {
      font-family: 'Lato', sans-serif;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.35);
      text-align: center;
      padding: 0 8px;
    }

    .g-slot img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 10px;
      position: absolute;
      inset: 0;
    }

    #countdown-section {
      background: linear-gradient(135deg, rgba(32, 5, 21, 1), rgba(2, 2, 10, 1));
      flex-direction: column;
      text-align: center;
    }

    .cd-wrap {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 28px;
    }

    .cd-box {
      min-width: 90px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(212, 168, 83, 0.17);
      border-radius: 12px;
      padding: 18px 14px;
    }

    .cd-num {
      font-family: 'Great Vibes', cursive;
      font-size: 56px;
      color: var(--gold2);
      line-height: 1;
      display: block;
    }

    .cd-lbl {
      font-family: 'Lato', sans-serif;
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.36);
      display: block;
      margin-top: 3px;
    }

    #finale {
      background: radial-gradient(ellipse at center, rgba(45, 10, 26, 1) 0%, rgba(2, 2, 10, 1) 70%);
      flex-direction: column;
      text-align: center;
      min-height: 80svh;
    }

    .finale-heart { font-size: clamp(50px, 12vw, 76px); margin-bottom: 10px; }

    .finale-title {
      font-family: 'Great Vibes', cursive;
      font-size: clamp(50px, 12vw, 112px);
      color: transparent;
      background: linear-gradient(135deg, var(--rose3), var(--gold2), var(--rose3));
      -webkit-background-clip: text;
      background-clip: text;
    }

    .finale-sub {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: clamp(14px, 2.5vw, 18px);
      color: rgba(255, 255, 255, 0.55);
      max-width: 440px;
      line-height: 1.75;
    }

    .confetti-piece {
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      border-radius: 2px;
      animation: confettiFall 3s ease-out forwards;
    }

    @keyframes confettiFall {
      0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }

    @media (max-width: 680px) {
      .gallery-grid {
        grid-template-columns: repeat(2, 1fr);
        grid-template-rows: repeat(3, 140px);
      }

      .g-slot:nth-child(1),
      .g-slot:nth-child(4) {
        grid-column: span 1;
      }
    }
  </style>
</head>
<body>
  <canvas id="three-canvas"></canvas>
  <div id="hint">✦ Click the stars and hearts to reveal hidden messages ✦</div>
  <div id="app"></div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const canvas = document.getElementById('three-canvas');
    const isMobile = window.innerWidth < 768 || /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent);
    const pixelRatio = Math.min(window.devicePixelRatio, isMobile ? 1.5 : 2);
    const messages = [
      'I love you', 'Stay', 'My person', 'Always you', 'Forever maybe', 'You glow', 'My heart', 'Still choosing you'
    ];

    const scene = new THREE.Scene();
    scene.background = new THREE.Color('#02020a');
    scene.fog = new THREE.FogExp2(0x02020a, isMobile ? 0.02 : 0.014);

    const camera = new THREE.PerspectiveCamera(70, innerWidth / innerHeight, 0.1, 300);
    camera.position.set(0, 0, 38);

    const renderer = new THREE.WebGLRenderer({ antialias: !isMobile, canvas, powerPreference: 'high-performance' });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(pixelRatio);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.035;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 0.12;
    controls.enableZoom = false;
    controls.enablePan = false;

    const textureCache = new Map();
    function textTexture(text, glow) {
      const key = text + '::' + glow;
      if (textureCache.has(key)) return textureCache.get(key);
      const c = document.createElement('canvas');
      c.width = 1024;
      c.height = 220;
      const ctx = c.getContext('2d');
      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      ctx.beginPath();
      ctx.roundRect(8, 8, c.width - 16, c.height - 16, 20);
      ctx.fill();
      ctx.shadowColor = glow;
      ctx.shadowBlur = 28;
      ctx.font = 'bold 64px Georgia,serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = '#fff';
      ctx.fillText(text, 512, 112);
      const t = new THREE.CanvasTexture(c);
      textureCache.set(key, t);
      return t;
    }

    function heartTexture(inner) {
      const c = document.createElement('canvas');
      c.width = 128;
      c.height = 128;
      const ctx = c.getContext('2d');
      ctx.translate(64, 64);
      ctx.scale(1, -1);
      const g = ctx.createRadialGradient(0, -10, 0, 0, -10, 60);
      g.addColorStop(0, 'rgba(255,255,255,1)');
      g.addColorStop(0.4, inner);
      g.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = g;
      ctx.beginPath();
      for (let i = 0; i <= Math.PI * 2; i += 0.07) {
        const x = 16 * Math.pow(Math.sin(i), 3);
        const y = 13 * Math.cos(i) - 5 * Math.cos(2 * i) - 2 * Math.cos(3 * i) - Math.cos(4 * i);
        ctx.lineTo(x * 2.5, y * 2.5);
      }
      ctx.fill();
      return new THREE.CanvasTexture(c);
    }

    function starTexture() {
      const c = document.createElement('canvas');
      c.width = 64;
      c.height = 64;
      const ctx = c.getContext('2d');
      ctx.translate(32, 32);
      const g = ctx.createRadialGradient(0, 0, 0, 0, 0, 28);
      g.addColorStop(0, 'rgba(255,255,255,1)');
      g.addColorStop(0.3, 'rgba(220,200,255,0.8)');
      g.addColorStop(1, 'rgba(160,102,255,0)');
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(0, 0, 28, 0, Math.PI * 2);
      ctx.fill();
      return new THREE.CanvasTexture(c);
    }

    const hearts = new THREE.Group();
    const stars = new THREE.Group();
    const overlays = [];
    const waves = [];
    let mIdx = 0;
    const clock = new THREE.Clock();

    const nebulaGeometry = new THREE.BufferGeometry();
    const nebCount = isMobile ? 1200 : 2800;
    const pos = new Float32Array(nebCount * 3);
    for (let i = 0; i < nebCount; i++) {
      pos[i * 3] = (Math.random() - 0.5) * 55;
      pos[i * 3 + 1] = (Math.random() - 0.5) * 45;
      pos[i * 3 + 2] = (Math.random() - 0.5) * 85;
    }
    nebulaGeometry.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    const nebula = new THREE.Points(
      nebulaGeometry,
      new THREE.PointsMaterial({
        size: 0.7,
        map: heartTexture('rgba(255,180,210,0.9)'),
        color: 0xd9b3ff,
        transparent: true,
        opacity: 0.45,
        blending: THREE.AdditiveBlending,
        depthWrite: false
      })
    );
    scene.add(nebula);

    const hMat = new THREE.SpriteMaterial({ map: heartTexture('rgba(255,180,210,0.9)'), color: 0xffccff, transparent: true, blending: THREE.AdditiveBlending });
    for (let i = 0; i < (isMobile ? 10 : 18); i++) {
      const h = new THREE.Sprite(hMat.clone());
      const sz = 1.3 + Math.random() * 0.9;
      h.position.set((Math.random() - 0.5) * 32, (Math.random() - 0.5) * 28, (Math.random() - 0.5) * 18);
      h.scale.setScalar(sz);
      h.userData = { off: Math.random() * 100, spd: 0.4 + Math.random() * 0.6, sz };
      hearts.add(h);
    }

    const sMat = new THREE.SpriteMaterial({ map: starTexture(), color: 0xfff0ff, transparent: true, blending: THREE.AdditiveBlending });
    for (let i = 0; i < (isMobile ? 20 : 38); i++) {
      const s = new THREE.Sprite(sMat.clone());
      const sz = 0.7 + Math.random() * 1.1;
      s.position.set((Math.random() - 0.5) * 48, (Math.random() - 0.5) * 38, (Math.random() - 0.5) * 22 - 3);
      s.scale.setScalar(sz);
      s.userData = { off: Math.random() * 100, tw: 0.35 + Math.random() * 0.7, sz };
      stars.add(s);
    }

    scene.add(hearts);
    scene.add(stars);

    function addWave(position) {
      const mesh = new THREE.Mesh(
        new THREE.RingGeometry(0.1, 0.22, 32),
        new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.8, side: THREE.DoubleSide, blending: THREE.AdditiveBlending })
      );
      mesh.position.copy(position);
      mesh.lookAt(camera.position);
      scene.add(mesh);
      waves.push({ mesh, s: 1, o: 0.8 });
    }

    function addTextOverlay(position, text, glow) {
      const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: textTexture(text, glow), transparent: true, depthTest: false }));
      sprite.position.set(position.x, position.y + 1.8, position.z + 0.5);
      sprite.scale.set(10, 2.4, 1);
      scene.add(sprite);
      overlays.push({ sprite, born: clock.getElapsedTime() });
    }

    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();
    function handleClick(clientX, clientY) {
      const stage = window.__surpriseStage || 'envelope';
      if (stage === 'envelope' || stage === 'reveal') return;
      pointer.x = (clientX / innerWidth) * 2 - 1;
      pointer.y = -(clientY / innerHeight) * 2 + 1;
      raycaster.setFromCamera(pointer, camera);
      const starHits = raycaster.intersectObjects(stars.children);
      if (starHits.length) {
        const hit = starHits[0].object;
        addTextOverlay(hit.position, messages[mIdx++ % messages.length], '#e0d0ff');
        addWave(hit.position);
        return;
      }
      const heartHits = raycaster.intersectObjects(hearts.children);
      if (heartHits.length) {
        const hit = heartHits[0].object;
        addTextOverlay(hit.position, messages[mIdx++ % messages.length], '#ff8fab');
        addWave(hit.position);
      }
    }

    canvas.addEventListener('click', (e) => handleClick(e.clientX, e.clientY));
    canvas.addEventListener('touchend', (e) => {
      if (e.changedTouches[0]) handleClick(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
    }, { passive: true });

    let ltScene;
    let ltCamera;
    let ltRenderer;
    let ltControls;
    let ltNebula;
    let ltHearts;
    const ltOverlays = [];
    const ltWaves = [];
    let ltInited = false;

    function goldHeartTexture() {
      return heartTexture('rgba(255,215,0,0.9)');
    }

    function initLetterScene() {
      if (ltInited) return;
      const el = document.getElementById('letter-back');
      const cv = document.getElementById('letter-three-canvas');
      if (!el || !cv) return;

      ltInited = true;
      ltScene = new THREE.Scene();
      ltScene.background = new THREE.Color('#02020a');
      const width = el.clientWidth || 640;
      const height = Math.max(el.clientHeight || 420, 380);

      ltCamera = new THREE.PerspectiveCamera(70, width / height, 0.1, 250);
      ltCamera.position.set(0, 0, 32);

      ltRenderer = new THREE.WebGLRenderer({ antialias: false, canvas: cv, powerPreference: 'high-performance' });
      ltRenderer.setPixelRatio(Math.min(pixelRatio, 1.5));
      ltRenderer.setSize(width, height);

      ltControls = new OrbitControls(ltCamera, ltRenderer.domElement);
      ltControls.enableDamping = true;
      ltControls.dampingFactor = 0.035;
      ltControls.autoRotate = true;
      ltControls.autoRotateSpeed = 0.14;
      ltControls.enableZoom = false;
      ltControls.enablePan = false;

      const neb = new THREE.BufferGeometry();
      const nebCountLt = isMobile ? 700 : 1600;
      const nebPos = new Float32Array(nebCountLt * 3);
      for (let i = 0; i < nebCountLt; i++) {
        nebPos[i * 3] = (Math.random() - 0.5) * 38;
        nebPos[i * 3 + 1] = (Math.random() - 0.5) * 32;
        nebPos[i * 3 + 2] = (Math.random() - 0.5) * 55;
      }
      neb.setAttribute('position', new THREE.BufferAttribute(nebPos, 3));
      ltNebula = new THREE.Points(
        neb,
        new THREE.PointsMaterial({
          size: 0.7,
          map: heartTexture('rgba(255,180,210,0.9)'),
          color: 0xbdd6ff,
          transparent: true,
          opacity: 0.45,
          blending: THREE.AdditiveBlending,
          depthWrite: false
        })
      );
      ltScene.add(ltNebula);

      ltHearts = new THREE.Group();
      const normalMat = new THREE.SpriteMaterial({ map: heartTexture('rgba(255,180,210,0.9)'), color: 0xffccff, transparent: true, blending: THREE.AdditiveBlending });
      for (let i = 0; i < 12; i++) {
        const h = new THREE.Sprite(normalMat.clone());
        h.position.set((Math.random() - 0.5) * 22, (Math.random() - 0.5) * 20, (Math.random() - 0.5) * 10);
        h.scale.setScalar(1.9);
        h.userData = { off: Math.random() * 100, pw: false, sz: 1.9 };
        ltHearts.add(h);
      }

      const parts = [
        { text: 'Part 1: love', color: 0xffd700, pos: new THREE.Vector3(-6, 5, 2) },
        { text: 'Part 2: able', color: 0xffa040, pos: new THREE.Vector3(5, -3, -1) },
        { text: 'loveableradio', color: 0xff69b4, pos: new THREE.Vector3(-1, -7, 3) }
      ];
      parts.forEach((p, i) => {
        const m = new THREE.SpriteMaterial({ map: goldHeartTexture(), color: p.color, transparent: true, blending: THREE.AdditiveBlending });
        const h = new THREE.Sprite(m);
        h.position.copy(p.pos);
        h.scale.setScalar(3.2);
        h.userData = { off: Math.random() * 100, pw: true, idx: i, text: p.text, sz: 3.2 };
        ltHearts.add(h);
      });
      ltScene.add(ltHearts);

      const lrc = new THREE.Raycaster();
      const lpt = new THREE.Vector2();
      function hitLetter(clientX, clientY) {
        if (!window.__letterBackOpen) return;
        const rect = cv.getBoundingClientRect();
        lpt.x = ((clientX - rect.left) / rect.width) * 2 - 1;
        lpt.y = -((clientY - rect.top) / rect.height) * 2 + 1;
        lrc.setFromCamera(lpt, ltCamera);
        const hits = lrc.intersectObjects(ltHearts.children);
        if (!hits.length) return;
        const hit = hits[0].object;
        const txt = hit.userData.pw ? hit.userData.text : messages[Math.floor(Math.random() * messages.length)];
        const glow = hit.userData.pw ? '#ffd26b' : '#ff8fab';
        const sp = new THREE.Sprite(new THREE.SpriteMaterial({ map: textTexture(txt, glow), transparent: true, depthTest: false }));
        sp.position.set(hit.position.x, hit.position.y + 1.8, hit.position.z + 0.4);
        sp.scale.set(hit.userData.pw ? 10.5 : 8.5, hit.userData.pw ? 2.4 : 2, 1);
        ltScene.add(sp);
        ltOverlays.push({ sprite: sp, born: clock.getElapsedTime() });
        const ring = new THREE.Mesh(
          new THREE.RingGeometry(0.1, 0.2, 28),
          new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.8, side: THREE.DoubleSide, blending: THREE.AdditiveBlending })
        );
        ring.position.copy(hit.position);
        ring.lookAt(ltCamera.position);
        ltScene.add(ring);
        ltWaves.push({ mesh: ring, s: 1, o: 0.8 });
      }

      cv.addEventListener('click', (e) => hitLetter(e.clientX, e.clientY));
      cv.addEventListener('touchend', (e) => {
        if (e.changedTouches[0]) hitLetter(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
      }, { passive: true });

      window.addEventListener('resize', () => {
        if (!ltInited) return;
        const nextW = el.clientWidth || 640;
        const nextH = Math.max(el.clientHeight || 420, 380);
        ltCamera.aspect = nextW / nextH;
        ltCamera.updateProjectionMatrix();
        ltRenderer.setSize(nextW, nextH);
      }, { passive: true });
    }

    window.__initLetterScene = initLetterScene;

    function animate() {
      requestAnimationFrame(animate);
      const t = clock.getElapsedTime();
      controls.update();
      nebula.rotation.z = t * 0.005;
      hearts.children.forEach((h) => {
        h.position.y += Math.sin(t * h.userData.spd * 0.45 + h.userData.off) * 0.003;
      });
      stars.children.forEach((s) => {
        s.scale.setScalar(s.userData.sz * (0.65 + 0.35 * Math.sin(t * s.userData.tw + s.userData.off)));
      });
      for (let i = waves.length - 1; i >= 0; i--) {
        const w = waves[i];
        w.s += 0.42;
        w.o -= 0.026;
        w.mesh.scale.setScalar(w.s);
        w.mesh.material.opacity = w.o;
        if (w.o <= 0) {
          scene.remove(w.mesh);
          waves.splice(i, 1);
        }
      }
      for (let i = overlays.length - 1; i >= 0; i--) {
        const o = overlays[i];
        const age = t - o.born;
        o.sprite.position.y += 0.002;
        o.sprite.material.opacity = age < 3.5 ? 1 : Math.max(0, 1 - (age - 3.5) / 1.2);
        if (age > 4.8) {
          scene.remove(o.sprite);
          overlays.splice(i, 1);
        }
      }
      renderer.render(scene, camera);

      if (ltInited && ltScene && ltRenderer) {
        ltControls.update();
        ltNebula.rotation.z = t * 0.005;
        ltHearts.children.forEach((h) => {
          h.position.y += Math.sin(t * 0.55 + h.userData.off) * 0.003;
          h.scale.setScalar(h.userData.sz + 0.1 * Math.sin(t * 0.8 + h.userData.off));
        });
        for (let i = ltWaves.length - 1; i >= 0; i--) {
          const w = ltWaves[i];
          w.s += 0.24;
          w.o -= 0.015;
          w.mesh.scale.setScalar(w.s);
          w.mesh.material.opacity = w.o;
          if (w.o <= 0) {
            ltScene.remove(w.mesh);
            ltWaves.splice(i, 1);
          }
        }
        for (let i = ltOverlays.length - 1; i >= 0; i--) {
          const o = ltOverlays[i];
          const age = t - o.born;
          o.sprite.position.y += 0.002;
          o.sprite.material.opacity = age < 3.5 ? 1 : Math.max(0, 1 - (age - 3.5) / 1.2);
          if (age > 4.8) {
            ltScene.remove(o.sprite);
            ltOverlays.splice(i, 1);
          }
        }
        ltRenderer.render(ltScene, ltCamera);
      }
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    }, { passive: true });
  </script>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useMemo, useState, useEffect, useRef } = React;

    const PASSWORD = "loveableradio";
    const BIRTHDAY = new Date("2005-04-12");

    const REASONS = [
      { t: "Your Smile", b: "The way Nazrin's face lights up when she laughs is the most beautiful thing I have ever seen." },
      { t: "Your Strength", b: "You face every storm with grace and rise every time. You inspire me more than you will ever know." },
      { t: "Your Heart", b: "You love so deeply, so purely. The kindness you carry makes the whole world softer and warmer." },
      { t: "Your Voice", b: "I could listen to you talk forever - about everything and nothing. Your voice is my favorite sound." },
      { t: "Your Light", b: "You make ordinary moments feel magical. Every day with you is a gift I count myself lucky to have." },
      { t: "Just You", b: "Not for any reason I can list. Simply because you exist. The universe made you, and I am grateful." },
    ];

    const GALLERY_LABELS = [
      "Our first photo",
      "A favorite memory",
      "Together forever",
      "Our adventure",
      "Something beautiful",
      "Us against the world",
    ];

    function getCountdownParts(now) {
      const target = new Date(BIRTHDAY);
      target.setFullYear(now.getFullYear());
      if (target <= now) target.setFullYear(now.getFullYear() + 1);

      const diff = target - now;
      return {
        days: Math.floor(diff / 86400000),
        hours: Math.floor((diff % 86400000) / 3600000),
        minutes: Math.floor((diff % 3600000) / 60000),
        seconds: Math.floor((diff % 60000) / 1000),
      };
    }

    function App() {
      const [stage, setStage] = useState("envelope");
      const [password, setPassword] = useState("");
      const [error, setError] = useState(false);
      const [unlocked, setUnlocked] = useState(false);
      const [countdown, setCountdown] = useState(getCountdownParts(new Date()));
      const [galleryImages, setGalleryImages] = useState(Array(6).fill(null));
      const [confetti, setConfetti] = useState([]);
      const [petals, setPetals] = useState([]);
      const [floaters, setFloaters] = useState([]);
      const [letterFlipped, setLetterFlipped] = useState(false);
      const letterRef = useRef(null);

      useEffect(() => {
        if (!unlocked) return;
        const timer = setInterval(() => {
          setCountdown(getCountdownParts(new Date()));
        }, 1000);
        return () => clearInterval(timer);
      }, [unlocked]);

      useEffect(() => {
        if (!confetti.length) return;
        const timeout = setTimeout(() => setConfetti([]), 5000);
        return () => clearTimeout(timeout);
      }, [confetti]);

      useEffect(() => {
        window.__surpriseStage = stage;
        const hint = document.getElementById("hint");
        if (hint) hint.classList.toggle("hidden", stage === "main");
      }, [stage]);

      useEffect(() => {
        window.__letterBackOpen = letterFlipped;
      }, [letterFlipped]);

      useEffect(() => {
        if (!unlocked) return;
        const petalIcons = ["🌸", "🌺", "🌹", "💮", "🏵️"];
        const heartIcons = ["♥", "💕", "🌸", "💖", "✨", "🌹"];
        setPetals(Array.from({ length: 18 }, (_, i) => ({
          id: `p-${i}`,
          icon: petalIcons[i % petalIcons.length],
          left: Math.random() * 100,
          duration: 7 + Math.random() * 9,
          delay: Math.random() * 14,
          size: 10 + Math.random() * 13,
        })));
        setFloaters(Array.from({ length: 14 }, (_, i) => ({
          id: `f-${i}`,
          icon: heartIcons[i % heartIcons.length],
          left: Math.random() * 100,
          duration: 9 + Math.random() * 12,
          delay: Math.random() * 18,
          size: 11 + Math.random() * 13,
        })));
      }, [unlocked]);

      const confettiColors = useMemo(
        () => ["#e8547a", "#ff8fab", "#d4a853", "#f0c070", "#ffffff", "#f8bbd0", "#c2185b", "#a066ff"],
        []
      );

      function openEnvelope() {
        setStage("reveal");
      }

      function goToPassword() {
        setStage("password");
      }

      function checkPassword() {
        if (password.trim().toLowerCase() === PASSWORD) {
          setUnlocked(true);
          setError(false);
          setStage("main");
        } else {
          setError(true);
          setPassword("");
          setTimeout(() => setError(false), 1400);
        }
      }

      function launchConfetti() {
        const pieces = Array.from({ length: 100 }, (_, i) => ({
          id: `${Date.now()}-${i}`,
          left: Math.random() * 100,
          width: 5 + Math.random() * 8,
          height: 5 + Math.random() * 8,
          delay: Math.random() * 0.9,
          duration: 2 + Math.random() * 2.5,
          radius: Math.random() > 0.5 ? "50%" : "2px",
          color: confettiColors[i % confettiColors.length],
        }));
        setConfetti(pieces);
      }

      function onSelectImage(index, file) {
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
          setGalleryImages((prev) => {
            const next = [...prev];
            next[index] = e.target.result;
            return next;
          });
        };
        reader.readAsDataURL(file);
      }

      return (
        <>
          <div id="envelope-screen" className={`screen ${stage !== "envelope" ? "gone" : ""}`}>
            <p className="env-title">✦ Nazrin, you have a surprise 🌹 ✦</p>
            <div className="envelope-wrap" onClick={openEnvelope}>
              <svg className="env-svg" viewBox="0 0 300 210" xmlns="http://www.w3.org/2000/svg">
                <defs>
                  <linearGradient id="eB" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style={{ stopColor: "#ad1457" }} /><stop offset="100%" style={{ stopColor: "#e8547a" }} /></linearGradient>
                  <linearGradient id="eF" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style={{ stopColor: "#880e4f" }} /><stop offset="100%" style={{ stopColor: "#ad1457" }} /></linearGradient>
                  <linearGradient id="eS" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style={{ stopColor: "#d4a853" }} /><stop offset="100%" style={{ stopColor: "#f0c070" }} /></linearGradient>
                </defs>
                <rect x="4" y="60" width="292" height="146" rx="8" ry="8" fill="url(#eB)" />
                <path d="M4,60 L150,142 L296,60 Z" fill="url(#eF)" />
                <circle cx="150" cy="127" r="26" fill="url(#eS)" />
              </svg>
            </div>
            <p className="open-label">tap to open</p>
          </div>

          <div id="reveal-msg" className={stage === "reveal" ? "show" : ""}>
            <p className="reveal-ornament">✦ &nbsp; for Nazrin &nbsp; ✦</p>
            <blockquote className="reveal-quote">Every star in this sky carries<br />a little message <em>for you.</em><br />Find them all.</blockquote>
            <p className="reveal-sub">- hidden among the stars, written just for you</p>
            <button className="reveal-continue" onClick={goToPassword}>continue ✦</button>
          </div>

          <div id="password-screen" className={`screen ${stage !== "password" ? "gone" : ""}`}>
            <div className="pw-card">
              <span className="pw-lock">{error ? "💔" : "🔐"}</span>
              <h2 className="pw-title">Secret Garden</h2>
              <p className="pw-sub">This surprise is locked with love...</p>
              <div className="pw-box">
                <input
                  className={`pw-input ${error ? "wrong" : ""}`}
                  type="password"
                  placeholder="enter the secret phrase"
                  autoComplete="off"
                  value={password}
                  onChange={(e) => setPassword(e.target.value)}
                  onKeyDown={(e) => { if (e.key === "Enter") checkPassword(); }}
                />
                <p className={`pw-error ${error ? "show" : ""}`}>That's not quite right, my love</p>
                <button className="pw-btn" onClick={checkPassword}>Unlock ✦</button>
              </div>
            </div>
          </div>

          {unlocked && (
            <div id="main-site">
              <div id="particles-layer">
                {petals.map((p) => (
                  <div
                    key={p.id}
                    className="petal"
                    style={{
                      left: `${p.left}%`,
                      animationDuration: `${p.duration}s`,
                      animationDelay: `${p.delay}s`,
                      fontSize: `${p.size}px`,
                    }}
                  >
                    {p.icon}
                  </div>
                ))}
                {floaters.map((f) => (
                  <div
                    key={f.id}
                    className="fheart"
                    style={{
                      left: `${f.left}%`,
                      animationDuration: `${f.duration}s`,
                      animationDelay: `${f.delay}s`,
                      fontSize: `${f.size}px`,
                    }}
                  >
                    {f.icon}
                  </div>
                ))}
              </div>

              <div className="music-bar">
                <div className="music-dot"></div>
                <span className="music-title">♪ A melody for Nazrin</span>
              </div>

              <section id="hero">
                <p className="hero-pre">✦ A Birthday To Remember ✦</p>
                <h1 className="hero-title">Happy Birthday,</h1>
                <div className="hero-name">Nazrin 🌹</div>
                <p className="hero-sub">
                  On the day the universe decided to gift the world something extraordinary - it gave us <em style={{ color: "var(--rose3)", fontStyle: "normal" }}>you</em>.
                  Every single moment with you is a blessing I never take for granted.
                </p>
                <p className="hero-date">- Mohammed Ashfar · April 12</p>
                <div className="hero-badge">
                  <button onClick={() => letterRef.current?.scrollIntoView({ behavior: "smooth" })}>Open your letter</button>
                </div>
              </section>

              <section id="quote-section">
                <p className="section-eyebrow">written in the stars</p>
                <blockquote className="big-quote">"In a room full of art,<br />I'd still stare at <em>Nazrin</em>."</blockquote>
                <p style={{ marginTop: "14px", letterSpacing: "3px", textTransform: "uppercase", fontFamily: "Lato,sans-serif", color: "rgba(255,255,255,0.34)", fontSize: "11px" }}>
                  always yours, Mohammed Ashfar
                </p>
              </section>

              <section id="reasons">
                <div style={{ width: "100%", maxWidth: "920px", textAlign: "center" }}>
                  <p className="section-eyebrow">with every heartbeat</p>
                  <h2 className="section-heading">Reasons I Love You</h2>
                  <div className="reasons-grid">
                    {REASONS.map((r, i) => (
                      <div className="r-card" key={r.t}>
                        <div className="r-num">0{i + 1}</div>
                        <div className="r-title">{r.t}</div>
                        <div className="r-body">{r.b}</div>
                      </div>
                    ))}
                  </div>
                </div>
              </section>

              <section id="letter" ref={letterRef}>
                <div style={{ width: "100%", maxWidth: "640px" }}>
                  <p className="section-eyebrow">sealed with love</p>
                  <h2 className="section-heading">A Letter From My Heart</h2>
                  <div
                    className="letter-flip-wrap"
                    onClick={() => {
                      setLetterFlipped((prev) => {
                        const next = !prev;
                        if (next) setTimeout(() => window.__initLetterScene && window.__initLetterScene(), 60);
                        return next;
                      });
                    }}
                  >
                    <div className={`letter-flipper ${letterFlipped ? "flipped" : ""}`}>
                      <div className="letter-front">
                        <div className="letter-paper">
                          <p className="letter-to">To: Nazrin</p>
                          <p className="letter-dear">My Dearest Nazrin,</p>
                          <div className="letter-body-text">
                            <p>There are a million things I want to say to you on your birthday, but words always fall short when it comes to describing how much you mean to me.</p>
                            <p>You are my favorite person in every room. You are the reason my days have color and my nights have peace. Your laugh is my favorite sound, your smile is my favorite sight, and your heart is the most beautiful thing I have ever known.</p>
                            <p>On this day - the day the world got a little more beautiful because you were born - I want you to feel every ounce of love I carry for you. You deserve the whole world, and I'll spend every day trying to give it to you.</p>
                            <p>Happy Birthday, my love. This is just the beginning of forever.</p>
                          </div>
                          <div className="letter-sig">Forever yours, Mohammed Ashfar 💕</div>
                        </div>
                      </div>
                      <div className="letter-back" id="letter-back">
                        <canvas id="letter-three-canvas"></canvas>
                        <div className="back-hint">✦ Click the golden hearts - they hold a secret ✦</div>
                      </div>
                    </div>
                  </div>
                  <p className="flip-hint">✦ flip the letter for a surprise ✦</p>
                </div>
              </section>

              <section id="gallery">
                <div style={{ width: "100%", maxWidth: "780px", textAlign: "center" }}>
                  <p className="section-eyebrow">captured forever</p>
                  <h2 className="section-heading">Our Memories Together</h2>
                  <div className="gallery-grid">
                    {GALLERY_LABELS.map((label, index) => (
                      <label className="g-slot" key={label}>
                        {galleryImages[index] ? (
                          <img src={galleryImages[index]} alt={`memory-${index + 1}`} />
                        ) : (
                          <>
                            <div className="g-slot-icon">📷</div>
                            <div className="g-slot-txt">{label}</div>
                          </>
                        )}
                        <input
                          type="file"
                          accept="image/*"
                          style={{ position: "absolute", inset: 0, opacity: 0, cursor: "pointer" }}
                          onChange={(e) => onSelectImage(index, e.target.files?.[0])}
                        />
                      </label>
                    ))}
                  </div>
                </div>
              </section>

              <section id="countdown-section">
                <div>
                  <p className="section-eyebrow">the clock is ticking</p>
                  <h2 className="section-heading" style={{ maxWidth: "560px", margin: "0 auto" }}>Counting Down to Your Day</h2>
                  <div className="cd-wrap">
                    <div className="cd-box"><span className="cd-num">{String(countdown.days).padStart(2, "0")}</span><span className="cd-lbl">Days</span></div>
                    <div className="cd-box"><span className="cd-num">{String(countdown.hours).padStart(2, "0")}</span><span className="cd-lbl">Hours</span></div>
                    <div className="cd-box"><span className="cd-num">{String(countdown.minutes).padStart(2, "0")}</span><span className="cd-lbl">Minutes</span></div>
                    <div className="cd-box"><span className="cd-num">{String(countdown.seconds).padStart(2, "0")}</span><span className="cd-lbl">Seconds</span></div>
                  </div>
                </div>
              </section>

              <section id="finale">
                <span className="finale-heart">♥</span>
                <h2 className="finale-title">I Love You</h2>
                <p className="finale-sub">Today, tomorrow, and every day in between.<br />You are my greatest adventure, Nazrin.</p>
                <button className="confetti-btn" onClick={launchConfetti}>Celebrate!</button>
              </section>
            </div>
          )}

          {confetti.map((p) => (
            <div
              key={p.id}
              className="confetti-piece"
              style={{
                left: `${p.left}vw`,
                top: 0,
                background: p.color,
                width: `${p.width}px`,
                height: `${p.height}px`,
                borderRadius: p.radius,
                animationDelay: `${p.delay}s`,
                animationDuration: `${p.duration}s`,
              }}
            />
          ))}
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("app")).render(<App />);
  </script>
</body>
</html>
